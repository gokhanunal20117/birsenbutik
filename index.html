<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadın & Çocuk Giyim</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#fafafa;
        }

        header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background:#444;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-weight:bold;
        }

        .hero{
            padding:80px 20px;
            text-align:center;
        }

        .hero h1{
            font-size:42px;
            margin-bottom:15px;
        }

        .hero p{
            font-size:20px;
            color:#666;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            background:#ff4081;
            color:white;
            padding:15px 35px;
            border-radius:30px;
            text-decoration:none;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:80px;
        }
    </style>

</head>

<body>

<header>
<h2>Kadın & Çocuk Giyim</h2>
</header>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#">Ürünler</a>
<a href="#">Hakkımızda</a>

</nav>

<section class="hero">

<h1>Yeni Sezon Ürünleri</h1>

<p>En kaliteli kadın ve çocuk giyim ürünleri.</p>

<a class="btn" href="#">Ürünleri İncele</a>

</section>

<footer>

</footer>

</html>
